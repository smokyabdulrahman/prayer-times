name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -race ./...

  build-cli:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binaries
        run: |
          BINARY_NAME="prayer-times"
          ALIAS_NAME="pt"
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            IFS='/' read -r GOOS GOARCH <<< "$platform"
            output_name="${BINARY_NAME}_${GOOS}_${GOARCH}"

            echo "Building ${output_name}..."
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 \
              go build -ldflags "$LDFLAGS" -o "dist/${BINARY_NAME}" ./cmd/prayer-times/
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 \
              go build -ldflags "$LDFLAGS" -o "dist/${ALIAS_NAME}" ./cmd/pt/

            tar -czf "dist/${output_name}.tar.gz" -C dist "${BINARY_NAME}" "${ALIAS_NAME}"
            rm "dist/${BINARY_NAME}" "dist/${ALIAS_NAME}"
          done

          ls -la dist/

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: dist/*.tar.gz

  build-menubar:
    needs: test
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build menubar app (${{ matrix.arch }})
        run: |
          PrayerTimesMenuBar/scripts/build.sh \
            --release \
            --arch ${{ matrix.arch }} \
            --output dist/PrayerTimesMenuBar.app

      - name: Create tarball
        run: |
          cd dist
          tar -czf "PrayerTimesMenuBar_darwin_${{ matrix.arch }}.tar.gz" PrayerTimesMenuBar.app

      - name: Upload menubar artifact
        uses: actions/upload-artifact@v4
        with:
          name: menubar-${{ matrix.arch }}
          path: dist/PrayerTimesMenuBar_darwin_${{ matrix.arch }}.tar.gz

  release:
    needs: [build-cli, build-menubar]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p dist
          cp artifacts/cli-binaries/*.tar.gz dist/
          cp artifacts/menubar-*/*.tar.gz dist/
          ls -la dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
